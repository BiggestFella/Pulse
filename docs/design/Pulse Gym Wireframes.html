<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pulse Gym — Wireframes</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root{
  --ff-display:"Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
  --ff-stat:"Oswald", "Impact", "Arial Narrow", sans-serif;
  --ff-mono:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:"Hanken Grotesk", system-ui, sans-serif;
  background:#f0eee9;
  color:#1f1f1f;
  min-height:100vh;
}

/* ── Phone frame for wireframes (Coastal Deep palette) ── */
.pulse{
  --bg:#06121F;
  --surface:#0E1F33;
  --ink:#FFF4D6;
  --ink-soft:rgba(255,244,214,.62);
  --ink-faint:rgba(255,244,214,.16);
  --accent:#26B6F6;
  --accent-deep:#0E5BA8;
  --accent-2:#FF6A1F;
  --on-accent:#06121F;
}

.phone{
  width:340px;height:720px;
  border-radius:50px;
  background:#0a0a0a;
  padding:8px;
  box-shadow:
    inset 0 0 0 2px #1f1f1f,
    inset 0 0 0 4px #2a2a2a,
    0 10px 30px rgba(0,0,0,.25);
  position:relative;
  flex:none;
}
.phone .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:108px;height:28px;border-radius:18px;background:#000;z-index:60}
.phone .screen{
  position:relative;width:100%;height:100%;
  border-radius:42px;overflow:hidden;
  background:var(--bg);color:var(--ink);
  display:flex;flex-direction:column;
}
.phone .status{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 28px 0;
  font-family:"Geist Mono", monospace;font-size:12px;font-weight:600;
  color:var(--ink);z-index:5;position:relative;
}
.phone .status .right{display:flex;gap:6px;align-items:center;font-size:10px}
.phone .status .bat{width:22px;height:11px;border:1.5px solid var(--ink);border-radius:3px;padding:1px;display:flex}
.phone .status .bat::after{content:"";flex:1;background:var(--ink);border-radius:1px}
.phone .body{
  position:relative;z-index:5;
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  padding:14px 18px 0;
}

/* Type primitives */
.eyebrow{font-family:"Geist Mono", monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:500}
.h-title{font-family:var(--ff-display);font-weight:800;font-size:30px;line-height:1;letter-spacing:-.025em;margin:0;color:var(--ink)}
.h-sub{font-family:var(--ff-display);font-size:13px;color:var(--ink-soft);font-weight:500;margin:4px 0 0}

/* Cards */
.card{
  background:var(--surface);
  border:1.5px solid var(--ink-faint);border-radius:18px;
  padding:14px 16px;
}
.card.accent{background:var(--accent);color:var(--on-accent);border-color:var(--ink)}
.card.flat{background:transparent;border:1.5px dashed var(--ink-faint)}

/* Buttons */
.btn{
  appearance:none;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--ff-display);font-weight:700;font-size:14px;letter-spacing:-.005em;
  padding:0 18px;height:46px;border-radius:999px;
  background:var(--accent);color:var(--on-accent);
  border:2px solid var(--ink);
  box-shadow:
    inset 0 2px 0 0 rgba(255,255,255,.28),
    inset 0 -3px 0 0 rgba(0,0,0,.22),
    0 4px 0 0 var(--ink);
}
.btn.sm{height:36px;font-size:12px;padding:0 14px;box-shadow:inset 0 2px 0 0 rgba(255,255,255,.28),inset 0 -2px 0 0 rgba(0,0,0,.18),0 3px 0 0 var(--ink)}
.btn.secondary{background:transparent;color:var(--ink);border:1.5px solid var(--ink);box-shadow:none}
.btn.ghost{background:transparent;color:var(--ink);border:0;box-shadow:none;padding:0}

.icon-btn{
  appearance:none;cursor:pointer;
  width:36px;height:36px;border-radius:50%;
  background:var(--surface);color:var(--ink);
  border:1.5px solid var(--ink-faint);
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--ff-display);font-weight:800;font-size:16px;
}

/* Lockup */
.lockup{display:inline-grid;grid-template-columns:auto auto;column-gap:12px;align-items:start}
.lockup .num{font-family:var(--ff-stat);font-weight:700;line-height:.82;letter-spacing:-.02em;grid-row:1 / span 2}
.lockup .lbl-top{font-family:"Geist Mono", monospace;font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-2);padding-top:8%}
.lockup .lbl-bot{font-family:var(--ff-display);font-weight:800;font-size:.22em;line-height:.95;letter-spacing:-.02em;align-self:start;margin-top:-.05em}

/* Lists */
.row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  background:var(--surface);
  border:1.5px solid var(--ink-faint);
  border-radius:14px;
}
.row.dashed{background:transparent;border-style:dashed}
.row.done{opacity:.5}
.row .badge{width:22px;height:22px;border-radius:50%;border:2px solid var(--ink-faint);flex:none;display:flex;align-items:center;justify-content:center;font-family:'Oswald, sans-serif';font-weight:700;font-size:12px;color:var(--ink)}
.row .nm{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.row .nm-name{font-family:var(--ff-display);font-weight:700;font-size:14px;letter-spacing:-.005em;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .nm-sub{font-family:"Geist Mono", monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:500}
.row .end{font-family:'Oswald', sans-serif;font-weight:700;font-size:18px;color:var(--ink);letterSpacing:-.01em}

/* Tab bar */
.tabbar{
  position:relative;z-index:5;
  display:flex;justify-content:space-around;align-items:center;
  background:var(--surface);
  border-top:1.5px solid var(--ink-faint);
  padding:8px 0 18px;
  margin-top:auto;
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--ink-soft);
  font-family:"Geist Mono", monospace;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
}
.tab.on{color:var(--ink)}
.tab .tab-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center}

/* Scroll body */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;margin:0 -18px;padding:0 18px 16px;display:flex;flex-direction:column;gap:8px}
.scroll::-webkit-scrollbar{width:0}

/* Mini chart placeholder */
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px;padding:6px 0}
.chart-bars div{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-width:0}
.chart-bars div.dim{background:var(--ink-faint)}

/* Calendar grid */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .d{
  aspect-ratio:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:8px;
  font-family:'Hanken Grotesk', sans-serif;font-size:12px;font-weight:700;
  color:var(--ink);position:relative;
}
.cal .d.muted{color:var(--ink-soft)}
.cal .d.has{background:var(--ink-faint)}
.cal .d.done{background:var(--accent);color:var(--on-accent)}
.cal .d.today{outline:2px solid var(--accent-2);outline-offset:-2px}
.cal .d .dot{width:4px;height:4px;border-radius:50%;background:currentColor;margin-top:1px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-head span{text-align:center;font-family:"Geist Mono", monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500}

/* Settings list */
.set-row{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:var(--surface);
  border-top:1.5px solid var(--ink-faint);
}
.set-row:first-child{border-radius:14px 14px 0 0;border-top:0}
.set-row:last-child{border-radius:0 0 14px 14px}
.set-row .label{flex:1;font-family:var(--ff-display);font-weight:600;font-size:14px;color:var(--ink)}
.set-row .val{font-family:"Geist Mono", monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.06em}

.switch{width:38px;height:22px;border-radius:11px;background:var(--ink-faint);position:relative;flex:none}
.switch.on{background:var(--accent)}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--ink);transition:left .2s}
.switch.on::after{left:18px;background:var(--on-accent)}

/* Hover on phones */
.phone{transition:transform .2s ease}

/* Wireframe markup hint */
.wf-note{
  position:absolute;top:8px;right:8px;z-index:50;
  padding:4px 8px;border-radius:6px;
  background:rgba(0,0,0,.4);color:#fff;
  font-family:"Geist Mono", monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
}

/* Section intro hint */
.intro{
  max-width:480px;margin:24px auto 8px;text-align:center;
  font-family:"Geist Mono", monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(60,50,40,.75);font-weight:500;
}
.intro h2{font-family:"Hanken Grotesk", sans-serif;font-weight:800;font-size:34px;letter-spacing:-.025em;margin:0 0 8px;color:#1f1f1f;text-transform:none;letter-spacing:-.02em}

</style>

</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">

const ICON = {
  back:  <span style={{fontFamily:'Oswald, sans-serif',fontWeight:700,fontSize:18,lineHeight:1}}>←</span>,
  fwd:   <span style={{fontFamily:'Oswald, sans-serif',fontWeight:700,fontSize:18,lineHeight:1}}>→</span>,
  plus:  <span style={{fontFamily:'Oswald, sans-serif',fontWeight:700,fontSize:22,lineHeight:1}}>+</span>,
  dots:  <span style={{fontFamily:'Hanken Grotesk, sans-serif',fontWeight:800,fontSize:18,lineHeight:1,letterSpacing:1}}>···</span>,
  chev:  <span style={{fontFamily:'Oswald, sans-serif',fontWeight:700,fontSize:14,lineHeight:1,opacity:.5}}>›</span>,
  grip:  <span style={{fontFamily:'Geist Mono, monospace',fontSize:13,opacity:.5,letterSpacing:-2}}>⋮⋮</span>,
  bolt:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" stroke="currentColor" strokeWidth="2.2" strokeLinejoin="round"/></svg>,
  chart: <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>,
  user:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="2.2"/><path d="M3 21c0-4.4 4-8 9-8s9 3.6 9 8" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>,
  cal:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" strokeWidth="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
  lib:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 6h7v14H4zM13 6h7v14h-7z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/></svg>,
};

function Status(){
  return (
    <div className="status">
      <span>9:41</span>
      <span className="right"><span>5G</span><span className="bat"></span></span>
    </div>
  );
}

function Tabs({on}){
  const t = [["today",ICON.bolt,"Today"],["library",ICON.lib,"Library"],["plan",ICON.cal,"Plan"],["you",ICON.user,"You"]];
  return (
    <div className="tabbar">
      {t.map(([k,ic,lbl]) => (
        <div key={k} className={"tab" + (on===k?" on":"")}>
          <div className="tab-icon">{ic}</div>
          <span>{lbl}</span>
        </div>
      ))}
    </div>
  );
}

function Phone({ note, tab, children }){
  return (
    <div className="phone pulse">
      {note && <div className="wf-note">{note}</div>}
      <div className="notch"></div>
      <div className="screen">
        <Status />
        <div className="body">{children}</div>
        {tab && <Tabs on={tab} />}
      </div>
    </div>
  );
}

function SectionHeader({ title, back=true, onBack, right, eyebrow }){
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:6}}>
        {back ? <div className="icon-btn">{ICON.back}</div> : <div></div>}
        {eyebrow && <span className="eyebrow">{eyebrow}</span>}
        <div className="icon-btn">{right || ICON.dots}</div>
      </div>
      {title && <h1 className="h-title">{title}</h1>}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────
// PROGRAM DETAIL
// ────────────────────────────────────────────────────────────────

function ProgramDetail_A(){
  return (
    <Phone note="A · week tabs" tab="library">
      <SectionHeader />
      <div className="eyebrow">PROGRAM · ACTIVE</div>
      <h1 className="h-title" style={{fontSize:30,marginTop:4}}>Push / Pull / Legs.</h1>
      <div className="h-sub">12 weeks · 5 days/wk · intermediate</div>

      <div style={{display:"flex",gap:6,overflowX:"auto",marginTop:12,paddingBottom:4,marginLeft:-2,marginRight:-2}}>
        {Array.from({length:8}).map((_,i)=>(
          <div key={i} style={{
            padding:"6px 12px",borderRadius:999,
            border:"1.5px solid " + (i===3?"var(--accent)":"var(--ink-faint)"),
            background:i===3?"var(--accent)":"transparent",
            color:i===3?"var(--on-accent)":"var(--ink)",
            fontFamily:"Geist Mono, monospace",fontSize:10,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",
            whiteSpace:"nowrap",flexShrink:0
          }}>WK {i+1}</div>
        ))}
      </div>

      <div className="card accent" style={{marginTop:12}}>
        <div style={{fontFamily:"Geist Mono, monospace",fontSize:10,letterSpacing:".16em",textTransform:"uppercase",fontWeight:600,opacity:.85}}>WEEK 4 · PROGRESS</div>
        <div className="lockup" style={{fontSize:64,marginTop:4}}>
          <div className="num" style={{color:"var(--on-accent)"}}>3<span style={{fontFamily:"Hanken Grotesk, sans-serif",fontSize:20,opacity:.6,marginLeft:4}}>/5</span></div>
          <div className="lbl-top" style={{color:"var(--accent-2)"}}>Done</div>
          <div className="lbl-bot">Two<br/>to go.</div>
        </div>
      </div>

      <div className="eyebrow" style={{marginTop:14,marginBottom:8}}>THIS WEEK</div>
      <div className="scroll">
        <div className="row done"><div className="badge">M</div><div className="nm"><div className="nm-name">Chest & Tris</div><div className="nm-sub">Done · 58m</div></div><span className="end">✓</span></div>
        <div className="row done"><div className="badge">T</div><div className="nm"><div className="nm-name">Back & Bis</div><div className="nm-sub">Done · 62m</div></div><span className="end">✓</span></div>
        <div className="row done"><div className="badge">W</div><div className="nm"><div className="nm-name">Legs</div><div className="nm-sub">Done · 71m</div></div><span className="end">✓</span></div>
        <div className="row" style={{borderColor:"var(--accent)",borderWidth:2}}><div className="badge" style={{background:"var(--accent)",color:"var(--on-accent)",borderColor:"var(--accent)"}}>T</div><div className="nm"><div className="nm-name">Shoulders</div><div className="nm-sub">Today · ~55m</div></div><span className="end" style={{color:"var(--accent)"}}>→</span></div>
        <div className="row"><div className="badge">F</div><div className="nm"><div className="nm-name">Arms · finisher</div><div className="nm-sub">Tomorrow · ~45m</div></div><span className="end">{ICON.chev}</span></div>
      </div>
    </Phone>
  );
}

function ProgramDetail_B(){
  return (
    <Phone note="B · long scroll" tab="library">
      <SectionHeader />
      <div className="eyebrow">PROGRAM</div>
      <h1 className="h-title" style={{fontSize:30,marginTop:4}}>Push / Pull / Legs.</h1>
      <div className="h-sub">Week 4 of 12 · intermediate</div>

      {/* Big progress lockup */}
      <div style={{marginTop:16,display:"flex",alignItems:"baseline",justifyContent:"space-between",borderBottom:"1.5px solid var(--ink-faint)",paddingBottom:10}}>
        <div className="lockup" style={{fontSize:80}}>
          <div className="num">23<span style={{fontFamily:"Hanken Grotesk, sans-serif",fontSize:24,opacity:.5,marginLeft:4}}>/60</span></div>
          <div className="lbl-top" style={{color:"var(--accent-2)"}}>Sessions</div>
          <div className="lbl-bot" style={{color:"var(--ink)"}}>Logged<br/>so far.</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div className="eyebrow">PACE</div>
          <div style={{fontFamily:"Oswald, sans-serif",fontWeight:700,fontSize:32,color:"var(--accent)",letterSpacing:"-.01em"}}>ON</div>
          <div style={{fontFamily:"Oswald, sans-serif",fontWeight:700,fontSize:32,color:"var(--accent)",letterSpacing:"-.01em",marginTop:-8}}>TRACK</div>
        </div>
      </div>

      <div className="scroll" style={{marginTop:10}}>
        {[1,2,3,4,5].map(w => (
          <div key={w}>
            <div className="eyebrow" style={{marginTop:w===1?0:8,marginBottom:6,display:"flex",justifyContent:"space-between"}}>
              <span>WEEK {w}</span>
              <span style={{color:w===4?"var(--accent)":"var(--ink-soft)"}}>{w<4?"5/5":w===4?"3/5 active":"upcoming"}</span>
            </div>
            <div style={{display:"flex",gap:4}}>
              {["M","T","W","T","F","S","S"].map((d,i) => {
                const state = w<4 ? "done" : w===4 ? (i<3?"done":i===3?"today":"") : i===5||i===6?"":"plan";
                return (
                  <div key={i} style={{
                    flex:1,aspectRatio:1,display:"flex",alignItems:"center",justifyContent:"center",
                    borderRadius:6,fontFamily:"Hanken Grotesk, sans-serif",fontSize:10,fontWeight:600,
                    background:state==="done"?"var(--accent)":state==="today"?"transparent":state==="plan"?"var(--ink-faint)":"transparent",
                    color:state==="done"?"var(--on-accent)":"var(--ink)",
                    border:state==="today"?"2px solid var(--accent-2)":state===""?"1px dashed var(--ink-faint)":"0",
                    opacity:state===""?.4:1,
                  }}>{d}</div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </Phone>
  );
}

// ────────────────────────────────────────────────────────────────
// WORKOUT BUILDER
// ────────────────────────────────────────────────────────────────

function Builder_A(){
  return (
    <Phone note="A · build from blank">
      <SectionHeader eyebrow="NEW WORKOUT" right={ICON.dots} />
      <input className="h-title" style={{border:0,background:"transparent",outline:"none",color:"var(--ink)",fontSize:28,padding:0,width:"100%"}} defaultValue="Untitled workout" />
      <div className="h-sub">Push · Tuesday · ~55 min</div>

      <div style={{display:"flex",gap:6,marginTop:14,flexWrap:"wrap"}}>
        <div style={{padding:"6px 10px",borderRadius:999,background:"var(--accent-2)",color:"var(--on-accent)",fontFamily:"Geist Mono, monospace",fontSize:10,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase"}}>PUSH</div>
        <div style={{padding:"6px 10px",borderRadius:999,border:"1.5px dashed var(--ink-faint)",fontFamily:"Geist Mono, monospace",fontSize:10,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--ink-soft)"}}>+ TAG</div>
      </div>

      <div className="eyebrow" style={{marginTop:14,marginBottom:8}}>EXERCISES · 3</div>

      <div className="scroll">
        <div className="row"><span style={{color:"var(--ink-faint)"}}>{ICON.grip}</span><div className="badge">1</div><div className="nm"><div className="nm-name">Flat Machine Chest Press</div><div className="nm-sub">4 sets · 15-12-10-8</div></div></div>

          border:"2px solid var(--ink)",borderBottom:0,

          display:"flex",flexDirection:"column",
          padding:"14px 18px 0",
        }}>
          {/* Handle */}
          <div style={{width:40,height:4,background:"var(--ink-faint)",borderRadius:4,margin:"0 auto 12px"}}></div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <h1 className="h-title" style={{fontSize:26}}>Add exercise.</h1>
            <div className="eyebrow">CHEST & TRIS</div>
          </div>

          {/* Search */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"10px 14px",borderRadius:14,background:"var(--surface)",border:"1.5px solid var(--ink-faint)"}}>
            <span style={{fontFamily:"Hanken Grotesk, sans-serif",fontWeight:500,fontSize:13,color:"var(--ink-soft)"}}>Search exercises…</span>
          </div>

          {/* Filters */}
          <div style={{display:"flex",gap:6,marginTop:10,overflowX:"auto"}}>
            {[["All",true],["Chest",false],["Tri",false],["Cable",false],["Machine",false],["DB",false]].map(([l,on],i) => (
              <div key={i} style={{
                padding:"5px 12px",borderRadius:999,
                border:"1.5px solid " + (on?"var(--accent)":"var(--ink-faint)"),
                background:on?"var(--accent)":"transparent",
                color:on?"var(--on-accent)":"var(--ink-soft)",
                fontFamily:"Geist Mono, monospace",fontSize:10,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",
                whiteSpace:"nowrap",flexShrink:0
              }}>{l}</div>
            ))}
          </div>

          <div className="eyebrow" style={{marginTop:12,marginBottom:6}}>RECENT</div>
          <div className="scroll" style={{gap:6}}>
            {[
              ["Flat Machine Chest Press","CHEST · COMPOUND · MACHINE",true],
              ["Incline DB Press","CHEST · COMPOUND · DUMBBELL"],
              ["Cable Fly","CHEST · ISOLATION · CABLE"],
              ["Tricep Cable Ext.","TRICEPS · CABLE",true],
              ["Plate Tricep Ext.","TRICEPS · COMPOUND"],
              ["Tricep Pushup","TRICEPS · BODYWEIGHT"],
              ["Close Grip Bench","TRICEPS · COMPOUND"],
            ].map(([n,t,added],i) => (
              <div key={i} className="row" style={{padding:"10px 12px",borderColor:added?"var(--accent)":"var(--ink-faint)"}}>
                <div className="nm"><div className="nm-name">{n}</div><div className="nm-sub">{t}</div></div>
                <div className="icon-btn" style={{
                  width:28,height:28,
                  background:added?"var(--accent)":"transparent",
                  color:added?"var(--on-accent)":"var(--ink)",
                  borderColor:added?"var(--accent)":"var(--ink-faint)",
                  fontSize:14
                }}>{added?"✓":"+"}</div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:8,padding:"10px 0 18px",borderTop:"1.5px solid var(--ink-faint)",marginTop:"auto"}}>
            <button type="button" className="btn secondary sm">Cancel</button>
            <button type="button" className="btn sm" style={{flex:1}}>Add 2 selected {ICON.fwd}</button>
          </div>
        </div>
      </div>
    </Phone>
  );
}
