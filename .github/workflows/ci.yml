name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Provision Secrets (gitignored; CI runs the mock data path)
        # project.yml points Debug/Release config files at Secrets.xcconfig,
        # which is gitignored. Tests use the in-memory mock (-uiMock), so the
        # values are irrelevant — CI only needs the file to exist so xcodegen
        # validation passes. Skip if a real file is already present.
        run: '[ -f Secrets.xcconfig ] || cp Secrets.example.xcconfig Secrets.xcconfig'
      - name: Generate project
        run: xcodegen generate
      - name: Build & test
        run: |
          # Pick whatever iPhone simulator the runner image actually has,
          # rather than pinning a model/OS that drifts between images.
          DEVICE_ID=$(xcrun simctl list devices available \
            | grep -E 'iPhone' | head -1 \
            | grep -oE '[0-9A-Fa-f-]{36}')
          echo "Using simulator: $DEVICE_ID"
          # Pre-boot the simulator so the first XCUITest launch isn't paying for a
          # cold boot (traces showed ~24s "setting up automation session" otherwise).
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b || true
          # UI tests on shared CI runners are timing-sensitive under contention:
          #  - one simulator (no parallel clones) to cut cross-process load,
          #  - auto-retry only the tests that fail (≤3 attempts) so a transient
          #    flake passes on retry while a genuine failure still fails,
          #  - a per-test time allowance so one pathologically slow test fails
          #    cleanly instead of hanging the whole job.
          # Unit tests are unaffected.
          xcodebuild -project Pulse.xcodeproj -scheme Pulse \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -parallel-testing-enabled NO \
            -retry-tests-on-failure -test-iterations 3 \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 300 \
            clean test
