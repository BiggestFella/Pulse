name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Provision Secrets (gitignored; CI runs the mock data path)
        # project.yml points Debug/Release config files at Secrets.xcconfig,
        # which is gitignored. Tests use the in-memory mock (-uiMock), so the
        # values are irrelevant — CI only needs the file to exist so xcodegen
        # validation passes. Skip if a real file is already present.
        run: '[ -f Secrets.xcconfig ] || cp Secrets.example.xcconfig Secrets.xcconfig'
      - name: Generate project
        run: xcodegen generate
      - name: Build & test
        run: |
          # Pick whatever iPhone simulator the runner image actually has,
          # rather than pinning a model/OS that drifts between images.
          DEVICE_ID=$(xcrun simctl list devices available \
            | grep -E 'iPhone' | head -1 \
            | grep -oE '[0-9A-Fa-f-]{36}')
          echo "Using simulator: $DEVICE_ID"
          xcodebuild -project Pulse.xcodeproj -scheme Pulse \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            clean test
