name: Pulse
options:
  bundleIdPrefix: au.com.codeheroes.pulse
  deploymentTarget:
    iOS: "17.0"
    watchOS: "26.0"   # DECIDED 2026-06-10 — personal use, Series 8 / watchOS 26.5
settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # On-device signing — Leon Creed-Baker Personal Team. Lives here so it
    # survives `xcodegen generate` (Xcode-UI signing changes get overwritten).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 5N3GNH647D
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  Pulse:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    # Explicit Info.plist: custom keys (Supabase config) need real $(VAR)
    # substitution, which INFOPLIST_KEY_* does NOT do for non-Apple keys.
    info:
      path: Pulse/Info.plist
      properties:
        # Reflect project.yml versions (xcodegen's default would hardcode 1.0/1).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Placeholders stamped with the real values at build time by the
        # "Stamp build" postBuildScript below (read back in the You footer).
        GitCommit: unknown
        BuildDate: unknown
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        UIAppFonts:
          - HankenGrotesk-Regular.ttf
          - HankenGrotesk-Medium.ttf
          - HankenGrotesk-SemiBold.ttf
          - HankenGrotesk-Bold.ttf
          - HankenGrotesk-ExtraBold.ttf
          - HankenGrotesk-Black.ttf
          - Oswald-Medium.ttf
          - Oswald-SemiBold.ttf
          - Oswald-Bold.ttf
          - GeistMono-Regular.ttf
          - GeistMono-Medium.ttf
          - GeistMono-SemiBold.ttf
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        DEV_USER_EMAIL: $(DEV_USER_EMAIL)
        DEV_USER_PASSWORD: $(DEV_USER_PASSWORD)
        # Widget deep links (BAK-19): pulse://start-today, pulse://today.
        CFBundleURLTypes:
          - CFBundleURLName: au.com.codeheroes.pulse
            CFBundleURLSchemes: [pulse]
    postBuildScripts:
      # Stamp the short git commit + build date into the built Info.plist so the
      # You-tab footer can identify exactly which build is running. Runs before
      # the implicit CodeSign phase, so it doesn't invalidate the signature.
      # `basedOnDependencyAnalysis: false` forces it to run on every build.
      - name: Stamp build (git commit + date)
        basedOnDependencyAnalysis: false
        # Declare the built Info.plist as input so this is ordered AFTER the
        # "Process Info.plist" step (otherwise the parallel build system may run
        # it first and the processed plist clobbers the stamp).
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
        script: |
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          COMMIT=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null || echo unknown)
          if ! git -C "$SRCROOT" diff --quiet HEAD 2>/dev/null; then COMMIT="${COMMIT}-dirty"; fi
          DATE=$(date "+%d %b %Y")
          /usr/libexec/PlistBuddy -c "Set :GitCommit ${COMMIT}" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :GitCommit string ${COMMIT}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :BuildDate ${DATE}" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :BuildDate string ${DATE}" "$PLIST"
          echo "Stamped ${COMMIT} (${DATE}) into ${PLIST}"
    sources:
      - path: Pulse
        excludes:
          - "Resources/Audio/**"
      - path: Pulse/Resources/Audio
        buildPhase: resources
      # Dual-compiled into the app target (also globbed by PulseWidgets) so the
      # DEBUG LiveActivityDebugScreen can render the shared Live Activity subviews
      # in-app for XCUITest. Keep this path in sync if the file moves.
      - path: PulseWidgets/WorkoutLiveActivityViews.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.codeheroes.pulse
        CODE_SIGN_ENTITLEMENTS: Pulse/Pulse.entitlements
    dependencies:
      - target: PulseWidgets
        embed: true
      - target: PulseWatch
        embed: true
      - package: Supabase
        product: Supabase
  PulseWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PulseWidgets
      - path: Pulse/Core/Workout/WorkoutActivityAttributes.swift
      - path: Pulse/Core/DesignSystem/Palette.swift
      - path: Pulse/Core/DesignSystem/Theme.swift
      - path: Pulse/Features/ActiveWorkout/SkipRestIntent.swift
      # Shared widget read-model + App Group store + deep-link routes (BAK-19).
      # The app owns writing (WidgetSnapshotWriter, app-only); the widget reads.
      - path: Pulse/Core/Widget/WidgetSnapshot.swift
      - path: Pulse/Core/Widget/WidgetSnapshotStore.swift
      - path: Pulse/Core/Widget/WidgetDeepLink.swift
      - path: Pulse/Core/Widget/WidgetTimeline.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.codeheroes.pulse.widgets
        INFOPLIST_FILE: PulseWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: PulseWidgets/PulseWidgets.entitlements
  PulseWatch:
    type: application
    platform: watchOS
    sources:
      - path: PulseWatch
      # Shared, platform-agnostic session types compiled into the watch app
      # (no WatchConnectivity/WatchKit in these files).
      - path: Pulse/Core/Workout/WorkoutSyncSnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.codeheroes.pulse.watchkitapp
        INFOPLIST_FILE: PulseWatch/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # Single-target watchOS app (watchOS 7+): no separate extension target.
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
  PulseTests:
    type: bundle.unit-test
    platform: iOS
    sources: [PulseTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pulse
  PulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [PulseUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # XcodeGen injects BUNDLE_LOADER/TEST_HOST product-type defaults onto
        # every "*test*" bundle, but a UI-testing bundle must NOT be app-hosted:
        # it runs out-of-process in its own -Runner.app and only needs
        # TEST_TARGET_NAME. Leaving BUNDLE_LOADER/TEST_HOST set makes the runner
        # link the app's XCTest copy alongside XCTAutomationSupport, producing the
        # "Class … implemented in both XCTestSupport and XCTAutomationSupport"
        # duplication and an early runner kill at bootstrap. Clear them explicitly.
        BUNDLE_LOADER: ""
        TEST_HOST: ""
    dependencies:
      - target: Pulse
schemes:
  Pulse:
    build:
      targets:
        Pulse: all
        PulseWatch: all
    test:
      targets: [PulseTests, PulseUITests]
  PulseWatch:
    build:
      targets:
        PulseWatch: all
