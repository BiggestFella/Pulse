name: Pulse
options:
  bundleIdPrefix: au.com.codeheroes.pulse
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # On-device signing — Leon Creed-Baker Personal Team. Lives here so it
    # survives `xcodegen generate` (Xcode-UI signing changes get overwritten).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 5N3GNH647D
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  Pulse:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    # Explicit Info.plist: custom keys (Supabase config) need real $(VAR)
    # substitution, which INFOPLIST_KEY_* does NOT do for non-Apple keys.
    info:
      path: Pulse/Info.plist
      properties:
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        UIAppFonts:
          - HankenGrotesk-Regular.ttf
          - HankenGrotesk-Medium.ttf
          - HankenGrotesk-SemiBold.ttf
          - HankenGrotesk-Bold.ttf
          - HankenGrotesk-ExtraBold.ttf
          - HankenGrotesk-Black.ttf
          - Oswald-Medium.ttf
          - Oswald-SemiBold.ttf
          - Oswald-Bold.ttf
          - GeistMono-Regular.ttf
          - GeistMono-Medium.ttf
          - GeistMono-SemiBold.ttf
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        DEV_USER_EMAIL: $(DEV_USER_EMAIL)
        DEV_USER_PASSWORD: $(DEV_USER_PASSWORD)
    sources:
      - path: Pulse
        excludes:
          - "Resources/Audio/**"
      - path: Pulse/Resources/Audio
        buildPhase: resources
      # Dual-compiled into the app target (also globbed by PulseWidgets) so the
      # DEBUG LiveActivityDebugScreen can render the shared Live Activity subviews
      # in-app for XCUITest. Keep this path in sync if the file moves.
      - path: PulseWidgets/WorkoutLiveActivityViews.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.codeheroes.pulse
    dependencies:
      - target: PulseWidgets
        embed: true
      - package: Supabase
        product: Supabase
  PulseWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PulseWidgets
      - path: Pulse/Core/Workout/WorkoutActivityAttributes.swift
      - path: Pulse/Core/DesignSystem/Palette.swift
      - path: Pulse/Core/DesignSystem/Theme.swift
      - path: Pulse/Features/ActiveWorkout/SkipRestIntent.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.codeheroes.pulse.widgets
        INFOPLIST_FILE: PulseWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
  PulseTests:
    type: bundle.unit-test
    platform: iOS
    sources: [PulseTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pulse
  PulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [PulseUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # XcodeGen injects BUNDLE_LOADER/TEST_HOST product-type defaults onto
        # every "*test*" bundle, but a UI-testing bundle must NOT be app-hosted:
        # it runs out-of-process in its own -Runner.app and only needs
        # TEST_TARGET_NAME. Leaving BUNDLE_LOADER/TEST_HOST set makes the runner
        # link the app's XCTest copy alongside XCTAutomationSupport, producing the
        # "Class … implemented in both XCTestSupport and XCTAutomationSupport"
        # duplication and an early runner kill at bootstrap. Clear them explicitly.
        BUNDLE_LOADER: ""
        TEST_HOST: ""
    dependencies:
      - target: Pulse
schemes:
  Pulse:
    build:
      targets:
        Pulse: all
    test:
      targets: [PulseTests, PulseUITests]
